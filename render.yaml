# Render Blueprint - deploy from GitHub: render.com/new
# Connects to your repo and auto-deploys on push

services:
  - type: web
    name: lms-trainer-portal
    runtime: node
    region: oregon

    buildCommand: npm install
    startCommand: npm run db:migrate && npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: ZOHO_CLIENT_ID
        sync: false
      - key: ZOHO_CLIENT_SECRET
        sync: false
      - key: ZOHO_REFRESH_TOKEN
        sync: false
      - key: ZOHO_ACCOUNTS_BASE
        sync: false
      - key: ZOHO_API_BASE
        sync: false
      - key: ZOHO_CLIQ_WEBHOOK_URL
        sync: false
      - key: ZOHO_MAIL_ACCOUNT_ID
        sync: false
      - key: ZOHO_MAIL_FROM
        sync: false
      - key: ZOHO_BOOKS_ORG_ID
        sync: false
      - key: ZOHO_BOOKS_CUSTOMER_ID
        sync: false
      - key: ZOHO_SIGN_TEMPLATE_ID
        sync: false
      - key: ZOHO_SIGN_ACTION_ID
        sync: false
      - key: ZOHO_WORKDRIVE_TEAM_ID
        sync: false
      - key: ZOHO_MEETING_ZSOID
        sync: false
      - key: ZOHO_MEETING_TIMEZONE
        value: Asia/Kolkata
      - key: ZOHO_DESK_ORG_ID
        sync: false
      - key: ZOHO_DESK_DEPARTMENT_ID
        sync: false
      - key: ZOHO_ANALYTICS_WORKSPACE_ID
        sync: false
