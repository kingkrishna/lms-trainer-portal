[build]
  publish = "public"
  command = "echo 'Build OK'"

[functions]
  node_bundler = "esbuild"

# API and health – proxy to serverless function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/api"
  status = 200
  force = true

